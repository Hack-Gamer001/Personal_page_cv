name: Compile LaTeX CV

on:
  push:
    paths:
      - 'cv/main.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Remove old PDF
        run: rm -f cv/main.pdf

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: cv
          latexmk_use_xelatex: false
          extra_system_packages: "py-pygments"
          args: "-pdf -interaction=nonstopmode -file-line-error"

      - name: Commit PDF
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add cv/main.pdf
          git commit -m "Auto: recompile CV PDF [skip ci]" || echo "No changes"
          git push
