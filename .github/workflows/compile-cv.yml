name: Compile LaTeX CV

on:
  push:
    paths:
      - 'cv/main.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-texlive-${{ hashFiles('cv/main.tex') }}
          restore-keys: |
            ${{ runner.os }}-texlive-

      - name: Remove old PDF
        run: rm -f cv/main.pdf

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: cv
          args: "-pdf -f -interaction=nonstopmode -file-line-error"

      - name: Commit PDF
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add cv/main.pdf
          git commit -m "Auto: recompile CV PDF [skip ci]" || echo "No changes"
          git push
